<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Procrastination Calculator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <h1>How much procrastination is too much?😜</h1>
        <p>Wanna calculate exactly how much you can slack off before the lock in? Let's go!</p>

        <input type="number" id="deadline" placeholder="Hours until the deadline (e.g., 48)">
        <input type="number" id="taskTime" placeholder="Hours the task actually takes (e.g., 5)">
    
        <input type="text" id="showName" placeholder="What show do you wanna watch? (e.g., The Office)">

        <button onclick="calculateSlacking()">Calculate My Free Time</button>

        <div id="result"></div>
    </div>
<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.3/dist/confetti.browser.min.js"></script>

    <script src="script.js"></script>

        
</body>
</html>
